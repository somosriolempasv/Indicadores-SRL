<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mi Documentación con Docsify</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Mi Proyecto',
      repo: 'https://github.com/somosriolempasv/Indicadores-SRL', // Opcional: Enlace a tu repositorio
      loadSidebar: true, // Cargar _sidebar.md si existe
      subMaxLevel: 2, // Niveles de encabezado en la tabla de contenido
      // Puedes añadir más opciones de configuración aquí
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  </body>
</html>
